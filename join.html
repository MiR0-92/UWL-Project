<!DOCTYPE html>
<html>
<head>
  <title>Pacman Controller</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100vh; /* Use 100% viewport height */
      overflow: hidden; /* Prevents scrollbars */
      background: #111;
      color: white;
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    @font-face {
        font-family: 'ArcadeR';
        src: url('font/ARCADE_R.TTF');
    }

    /* --- START: Full Screen Button Style --- */
    #fullscreen-btn {
      position: absolute;
      top: 3vh;
      right: 3vw;
      z-index: 1000; /* On top of everything */

      /* Copied from #feedback-button */
      font-family: 'ArcadeR', monospace;
      font-weight: bold;
      color: #111; /* Black text */
      background: #FFFF00; /* Pac-Man Yellow */
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;

      /* Sized for a corner button */
      font-size: 4vw; 
      padding: 12px 15px;
    }
    /* --- END: Full Screen Button Style --- */

    h1 {
      font-size: 7vw;
      margin: 0 0 1vh 0;
      font-family: 'ArcadeR', monospace;
    }

    /* --- Container Styling --- */
    .container {
      width: 100%;
      height: 100%; /* Make container fill the vh */
      display: flex;
      flex-direction: column;
      align-items: center;
      box-sizing: border-box; /* Important for padding */
    }

    #lobby-container {
      /* This will now vertically center the content */
      justify-content: center;
      padding: 2vh 0;
    }

    #controller-container {
      display: none; /* Hidden by default */
      flex-direction: column;
      
      /* --- START OF MODIFICATION --- */
      /* Align to the top */
      justify-content: flex-start; 
      /* Push the whole block down from the top */
      padding: 10vh 0 2vh 0; 
      /* --- END OF MODIFICATION --- */
      
      height: 100%; /* Ensure it fills the viewport height */
      box-sizing: border-box;
    }

    /* --- Lobby Styling --- */
    #lobby-container h1 {
      font-size: 8vw;
      color: #FFFF00; /* Pac-Man Yellow */
    }

    #ghost-selector {
      display: flex;
      flex-direction: column; /* Stack image and text vertically */
      align-items: center;
      justify-content: center;
      margin: 2vh 0;
    }
    
    .ghost-selector-row {
      display: flex;
      align-items: center;
    }

    .arrow-btn {
      font-size: 15vmin;
      color: #fff;
      background: none;
      border: none;
      padding: 0 5vw;
      cursor: pointer;
    }
    .arrow-btn:disabled {
      color: #444;
    }

    #ghost-image-lobby {
      width: 45vmin;
      height: 45vmin;
      image-rendering: pixelated; /* Keeps the pixel art sharp */
    }

    #ghost-name-lobby {
      font-size: 5vw;
      color: #fff;
      margin-top: 1.5vh;
      font-weight: bold;
      text-transform: capitalize;
      font-family: 'ArcadeR', monospace;
    }

    #player-name-lobby {
      width: 70vw;
      max-width: 300px;
      
      /* --- START OF MODIFICATION --- */
      padding: 10px; /* Reduced padding */
      font-size: 4vw; /* Reduced font size */
      /* --- END OF MODIFICATION --- */

      text-align: center;
      background: #333;
      color: #fff;
      border: 2px solid #555;
      border-radius: 8px;
      margin-bottom: 2vh;
      font-family: 'ArcadeR', monospace;
    }

    #join-button {
      width: 70vw;
      max-width: 300px;
      padding: 15px;
      font-size: 6vw;
      font-weight: bold;
      color: #111;
      background: #87CEEB; /* Skyblue */
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'ArcadeR', monospace;
    }
    #join-button:disabled {
      background: #555;
      color: #888;
    }

    #lobby-status {
      margin-top: 2vh;
      color: #ff4444;
      font-size: 4vw;
      height: 1.2em; 
      font-family: 'ArcadeR', monospace;
    }

    /* --- Controller View Styling (Re-ordered) --- */
    #player-name-ingame {
      font-size: 7vw;
      font-weight: bold;
      color: #87CEEB; /* Skyblue */
      margin-bottom: 1vh; /* Add a little space */
      font-family: 'ArcadeR', monospace;
    }

    #ghost-image-ingame {
      width: 40vmin; /* 4x larger (as requested) */
      height: 40vmin; /* 4x larger (as requested) */
      image-rendering: pixelated;
    }
    
    #playing-as-text {
      font-size: 5vw;
      margin: 1vh 0 0 0; /* Add a little space */
      text-transform: capitalize;
      font-family: 'ArcadeR', monospace;
    }

    #joystick-container {
      position: relative;
      /* This creates the gap between the text and the joystick */
      margin-bottom: 3vh; 
      flex-grow: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #joystick-base {
      position: relative;
      width: 40vmin;
      height: 40vmin;
      background: rgba(135, 206, 235, 0.4); 
      border: 3px solid #87CEEB;
      border-radius: 50%;
    }

    #joystick-stick {
      position: absolute;
      width: 20vmin;
      height: 20vmin;
      background: #007FFF;
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      transition: transform 0.05s linear;
    }

    #connection-status {
      font-size: 4vw;
      font-weight: bold;
      margin: 0;
      font-family: 'ArcadeR', monospace;
    }
    
    /* --- START: Exit Button Styles --- */
    .exit-btn {
      position: absolute;
      top: 3vh;
      left: 3vw;
      background: none;
      border: none;
      color: #fff;
      font-family: 'ArcadeR', monospace;
      font-size: 4vw;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 15vw;
    }
    .exit-btn img {
      width: 12vw;
      height: 12vw;
      image-rendering: pixelated;
      margin-bottom: 0.5vh;
    }
    /* --- END: Exit Button Styles --- */

    /* --- START: Exit Screen Styles --- */
    #exit-container {
      display: none; /* Hidden by default */
      justify-content: flex-start; 
      padding-top: 10vh; 
      text-align: center;
      font-family: 'ArcadeR', monospace;
    }
    #exit-container h1 {
      font-size: 6vw;
      color: #FFFF00; /* Pac-Man Yellow */
      margin-bottom: 4vh;
    }
    #exit-container p {
      font-size: 5vw;
      color: #fff;
      margin: 1.5vh 0;
    }

    #exit-countdown {
      font-size: 4vw;
      color: #ccc;
      font-family: 'ArcadeR', monospace;
      margin-bottom: 8vh; 
    }

    #exit-greeting {
      font-size: 5vw;
      color: #fff;
      margin: 0;
    }

    #exit-username {
      font-size: 6vw;
      color: #FFFF00; /* Pac-Man Yellow */
      margin-top: 0.5vh; 
      margin-bottom: 5vh; 
    }

    #exit-score-label {
      font-size: 5vw;
      color: #fff;
      margin: 0;
    }
    
    #exit-score-value {
      font-size: 5vw;
      color: #FFFF00; /* Yellow for score */
      margin-top: 0.5vh; 
    }
    
    .exit-feedback {
      font-size: 4vw;
      color: #ccc;
      margin-top: 5vh; 
    }
    
    #feedback-button {
      width: 70vw;
      max-width: 300px;
      padding: 15px;
      font-size: 6vw;
      font-weight: bold;
      font-family: 'ArcadeR', monospace;
      text-decoration: none;
      color: #111; /* Black text */
      background: #FFFF00; /* Pac-Man Yellow */
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 3vh; 
    }
    /* --- END: Exit Screen Styles --- */

  </style>
</head>
<body>
  
  <button id="fullscreen-btn">FULL SCREEN</button>
  <div id="lobby-container" class="container">
    <h1>CHOOSE GHOST</h1>
    
    <input type="text" id="player-name-lobby" placeholder="Enter Your Name">

    <div id="ghost-selector">
      <div class="ghost-selector-row">
        <button id="prev-ghost" class="arrow-btn">&lt;</button>
        <img id="ghost-image-lobby" src="/images/blinky.png" alt="Selected Ghost">
        <button id="next-ghost" class="arrow-btn">&gt;</button>
      </div>
      <p id="ghost-name-lobby">playing as Blinky</p>
    </div>
    
    <button id="join-button">JOIN GAME</button>

    <p id="lobby-status"></p>
  </div>

  <div id="controller-container" class="container">
    
    <button id="exit-button" class="exit-btn">
      <img src="/images/door.png" alt="Exit"> <span>EXIT</span>
    </button>
    <span id="player-name-ingame">Player</span>
    
    <img id="ghost-image-ingame" src="/images/blinky.png">
    
    <p id="playing-as-text">playing as <span id="ghost-name-ingame">Blinky</span></p>

    <div id="joystick-container">
      <div id="joystick-base">
        <div id="joystick-stick"></div>
      </div>
    </div>
    
    <p id="connection-status">Status: <span id="status-text">Connecting...</span></p>

  </div>

  <div id="exit-container" class="container">
    <p id="exit-countdown"></p>
  
    <p id="exit-greeting">Thank you for playing</p>
    <h1 id="exit-username">Player</h1>
    
    <p id="exit-score-label">Your score is:</p>
    <p id="exit-score-value">0</p>
    
    <p class="exit-feedback">Would you like to leave some feedback?</p>

    <a href="https://forms.gle/LyftbtqTAmJqrXBh7" target="_blank" id="feedback-button">HERE!</a>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    // --- Page Elements ---
    const lobbyContainer = document.getElementById('lobby-container');
    const controllerContainer = document.getElementById('controller-container');
    const lobbyStatus = document.getElementById('lobby-status');

    // Lobby Elements
    const prevGhostBtn = document.getElementById('prev-ghost');
    const nextGhostBtn = document.getElementById('next-ghost');
    const ghostImageLobby = document.getElementById('ghost-image-lobby');
    const ghostNameLobby = document.getElementById('ghost-name-lobby');
    const playerNameInput = document.getElementById('player-name-lobby');
    const joinButton = document.getElementById('join-button');

    // Controller Elements
    const playerNameIngame = document.getElementById('player-name-ingame');
    const ghostImageIngame = document.getElementById('ghost-image-ingame');
    const ghostNameIngame = document.getElementById('ghost-name-ingame');
    const statusText = document.getElementById('status-text');
    const base = document.getElementById('joystick-base');
    const stick = document.getElementById('joystick-stick');
    
    // --- START: New Exit Elements ---
    const exitButton = document.getElementById('exit-button');
    const exitContainer = document.getElementById('exit-container');
    
    const exitCountdown = document.getElementById('exit-countdown'); 
    const exitGreeting = document.getElementById('exit-greeting');
    const exitUsername = document.getElementById('exit-username');
    const exitScoreLabel = document.getElementById('exit-score-label');
    const exitScoreValue = document.getElementById('exit-score-value');
    // --- END: New Exit Elements ---


    // --- State Variables ---
    const GHOSTS = [
      { name: 'blinky', path: '/images/blinky.png' },
      { name: 'pinky', path: '/images/pinky.png' },
      { name: 'inky', path: '/images/inky.png' },
      { name: 'clyde', path: '/images/clyde.png' }
    ];
    let currentGhostIndex = 0;
    let takenGhosts = {}; // { blinky: { name: "Player1" }, pinky: null, ... }
    let myGhostName = null;

    let baseCenterX, baseCenterY;
    let maxDistance;
    let deadZone;
    let currentDirection = null;
    let activeTouchId = null;
    let countdownInterval = null; 
    
    // --- View Switching ---
    function showLobby() {
      lobbyContainer.style.display = 'flex';
      controllerContainer.style.display = 'none';
      exitContainer.style.display = 'none'; // Hide exit screen
      if (countdownInterval) clearInterval(countdownInterval); 
      lobbyStatus.textContent = '';
      updateGhostSelector(); // Re-check ghost availability
    }

    function showController(player) {
      lobbyContainer.style.display = 'none';
      controllerContainer.style.display = 'flex';
      exitContainer.style.display = 'none'; // Hide exit screen
      
      myGhostName = player.ghost;
      const ghostData = GHOSTS.find(g => g.name === player.ghost);
      
      // Populate player info
      playerNameIngame.textContent = player.name;
      ghostImageIngame.src = ghostData.path;
      ghostNameIngame.textContent = player.ghost;

      // We MUST re-initialize the joystick here, *after* it becomes visible
      // Otherwise, getBoundingClientRect() returns zeros.
      // A small delay ensures the browser has rendered it.
      setTimeout(initializeJoystick, 50);
    }
    
    // --- MODIFIED: New Exit Screen Function ---
    function showExitScreen(score) {
      lobbyContainer.style.display = 'none';
      controllerContainer.style.display = 'none';
      exitContainer.style.display = 'flex'; // Show exit screen

      // MODIFIED: Set new text elements
      const playerName = playerNameIngame.textContent;
      exitUsername.textContent = playerName; // Just set the username
      exitScoreValue.textContent = score; // Just set the score

      // --- START COUNTDOWN LOGIC ---
      let countdownValue = 15;
      exitCountdown.textContent = `Exiting in ${countdownValue}...`;

      if (countdownInterval) clearInterval(countdownInterval); // Clear any old timer
      countdownInterval = setInterval(() => {
        countdownValue--;
        exitCountdown.textContent = `Exiting in ${countdownValue}...`;

        if (countdownValue <= 0) {
          clearInterval(countdownInterval);
          // We can't close the window, so we'll redirect to the lobby
          window.location.href = '/join'; 
        }
      }, 1000);
      // --- END COUNTDOWN LOGIC ---

      // Disconnect from server
      socket.disconnect();
    }
    // --- END: New Exit Screen Function ---


    // --- Lobby Logic ---
    function updateGhostSelector() {
      const ghost = GHOSTS[currentGhostIndex];
      ghostImageLobby.src = ghost.path;
      ghostNameLobby.textContent = `playing as ${ghost.name}`; // Update text

      // Check if this ghost is taken
      if (takenGhosts[ghost.name]) {
        joinButton.disabled = true;
        joinButton.textContent = 'TAKEN';
        lobbyStatus.textContent = `${ghost.name} is being played by ${takenGhosts[ghost.name].name}`;
      } else {
        joinButton.disabled = false;
        joinButton.textContent = 'JOIN GAME';
        lobbyStatus.textContent = '';
      }
    }

    prevGhostBtn.addEventListener('click', () => {
      currentGhostIndex = (currentGhostIndex - 1 + GHOSTS.length) % GHOSTS.length;
      updateGhostSelector();
    });

    nextGhostBtn.addEventListener('click', () => {
      currentGhostIndex = (currentGhostIndex + 1) % GHOSTS.length;
      updateGhostSelector();
    });

    // --- MODIFIED: Add join validation ---
    playerNameInput.addEventListener('input', () => {
        lobbyStatus.textContent = ''; // Clear error on typing
    });

    joinButton.addEventListener('click', () => {
        const playerName = playerNameInput.value; // Get raw value
        const ghostName = GHOSTS[currentGhostIndex].name;
        
        // 1. Check for empty name
        if (playerName.trim().length === 0) {
            lobbyStatus.textContent = 'Please enter a name!';
            return;
        }

        // 2. Check for length
        if (playerName.length > 6) {
            lobbyStatus.textContent = 'Name must be 6 characters or less.';
            return;
        }

        // 3. Check for spaces
        if (/\s/.test(playerName)) {
            lobbyStatus.textContent = 'Spaces are not allowed.';
            return;
        }

        // 4. Check for special symbols (any non-letter/non-number)
        if (/[^a-zA-Z0-9]/.test(playerName)) {
            lobbyStatus.textContent = 'Special symbols are forbidden.';
            return;
        }

        // If all checks pass:
        lobbyStatus.textContent = `Joining as ${ghostName}...`;
        joinButton.disabled = true;
        
        socket.emit('join-request', { name: playerName.trim(), ghost: ghostName });
    });
    // --- END: Add join validation ---


    // --- Socket Handlers ---
    socket.on('connect', () => {
      statusText.textContent = 'Connected!';
      statusText.style.color = 'lime';
      // Ask server for the current ghost status
      socket.emit('controller-ready');
    });
    
    socket.on('disconnect', () => {
      statusText.textContent = 'Disconnected';
      statusText.style.color = 'red';
      myGhostName = null;
      // Only show lobby if we are not *intentionally* on the exit screen
      if (exitContainer.style.display === 'none') {
        showLobby();
      }
    });

    socket.on('ghost-status', (status) => {
      takenGhosts = status;
      // If we are in the lobby, update the selector
      if (controllerContainer.style.display === 'none' && exitContainer.style.display === 'none') {
        updateGhostSelector();
      }
    });

    socket.on('join-success', (player) => {
      // Server confirmed our join request
      showController(player);
    });

    socket.on('join-error', (data) => {
      // Server rejected our join request
      lobbyStatus.textContent = data.message;
      joinButton.disabled = false; // Re-enable button
      // We removed updateGhostSelector() from here to prevent it from clearing the error message
    });

    // --- START: New Score Receiver ---
    socket.on('receive-exit-data', (data) => {
      showExitScreen(data.score);
    });
    // --- END: New Score Receiver ---

    // --- Socket Emitter (Joystick) ---
    const sendDirection = (dir, pressed) => {
      if (dir && myGhostName) { // Only send if we are in-game
        socket.emit('control', { 
          direction: dir, 
          pressed: pressed 
        });
      }
    };

    // --- Joystick Logic (Copied from original) ---
    function getDirection(dx, dy) {
      if (Math.abs(dx) < deadZone && Math.abs(dy) < deadZone) return null;
      if (Math.abs(dx) > Math.abs(dy)) {
        return (dx > 0) ? 'right' : 'left';
      } else {
        return (dy > 0) ? 'down' : 'up';
      }
    }

    function initializeJoystick() {
      if (!base.offsetParent) return; // Don't run if hidden
      const baseRect = base.getBoundingClientRect();
      baseCenterX = baseRect.left + baseRect.width / 2;
      baseCenterY = baseRect.top + baseRect.height / 2;
      maxDistance = base.offsetWidth / 2 - stick.offsetWidth / 2;
      deadZone = maxDistance * 0.2;
    }

    function moveStick(clientX, clientY) {
      const dx = clientX - baseCenterX;
      const dy = clientY - baseCenterY;
      const distance = Math.sqrt(dx * dx + dy * dy);
      const angle = Math.atan2(dy, dx);
      
      const stickDistance = Math.min(distance, maxDistance);
      const stickPosX = Math.cos(angle) * stickDistance;
      const stickPosY = Math.sin(angle) * stickDistance;

      stick.style.transform = `translate(calc(-50% + ${stickPosX}px), calc(-50% + ${stickPosY}px))`;

      const newDirection = getDirection(dx, dy);
      if (newDirection !== currentDirection) {
        sendDirection(currentDirection, false);
        sendDirection(newDirection, true);
        currentDirection = newDirection;
      }
    }

    // --- START: Exit Button Logic (Moved Before Touch Listeners) ---
    // MODIFIED: This now works for both click and touchstart
    exitButton.addEventListener('click', (e) => {
      e.preventDefault(); // Prevent any double-event issues
      statusText.textContent = 'Leaving...';
      // Ask server to get our score and disconnect us
      socket.emit('client-leave-request');
    });
    // --- END: Exit Button Logic ---

    document.body.addEventListener('touchstart', (e) => {
      // --- MODIFIED: Check if the touch is on the exit button ---
      if (e.target === exitButton || exitButton.contains(e.target)) {
        return; // Let the 'click' event handle it
      }
      // --- End of Fix ---

      // --- START: Check if touch is on the fullscreen button ---
      const fsBtn = document.getElementById('fullscreen-btn');
      if (e.target === fsBtn || fsBtn.contains(e.target)) {
        return; // Let the 'click' event handle it
      }
      // --- END: Check ---

      if (controllerContainer.style.display === 'none') return; // Ignore touches in lobby
      e.preventDefault();
      if (activeTouchId !== null) return;
      const touch = e.changedTouches[0];
      activeTouchId = touch.identifier;
      moveStick(touch.clientX, touch.clientY);
    }, { passive: false });

    document.body.addEventListener('touchmove', (e) => {
      if (controllerContainer.style.display === 'none') return;
      e.preventDefault();
      if (activeTouchId === null) return;
      const touch = Array.from(e.changedTouches).find(t => t.identifier === activeTouchId);
      if (!touch) return;
      moveStick(touch.clientX, touch.clientY);
    }, { passive: false });

    function onTouchEnd(e) {
      if (controllerContainer.style.display === 'none') return;
      
      // --- MODIFIED: Check if the touch end is for the exit button ---
      if (e.target === exitButton || exitButton.contains(e.target)) {
        return; // Let the 'click' event handle it
      }
      // --- End of Fix ---

      // --- START: Check if touch end is on the fullscreen button ---
      const fsBtn = document.getElementById('fullscreen-btn');
      if (e.target === fsBtn || fsBtn.contains(e.target)) {
        return; // Let the 'click' event handle it
      }
      // --- END: Check ---
      
      e.preventDefault();
      if (activeTouchId === null) return;
      const touch = Array.from(e.changedTouches).find(t => t.identifier === activeTouchId);
      if (!touch) return;

      activeTouchId = null;
      stick.style.transform = 'translate(-50%, -50%)';
      
      if (currentDirection) {
        sendDirection(currentDirection, false);
        currentDirection = null;
      }
    }

    document.body.addEventListener('touchend', onTouchEnd);
    document.body.addEventListener('touchcancel', onTouchEnd);

    window.addEventListener('resize', initializeJoystick);
    
    // --- Initial Setup ---
    showLobby(); // Start on the lobby screen

  </script>

  <script>
    document.getElementById('fullscreen-btn').addEventListener('click', function() {
      var elem = document.documentElement; // Get the whole <html> element
      
      if (elem.requestFullscreen) {
        elem.requestFullscreen();
      } else if (elem.mozRequestFullScreen) { // Firefox
        elem.mozRequestFullScreen();
      } else if (elem.webkitRequestFullscreen) { // Chrome, Safari and Opera
        elem.webkitRequestFullscreen();
      } else if (elem.msRequestFullscreen) { // IE/Edge
        elem.msRequestFullscreen();
      }
  
      // Optional: You could hide the button after it's clicked
      this.style.display = 'none'; 
    });
  </script>
  </body>
</html>
