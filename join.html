<!DOCTYPE html>
<html>
<head>
  <title>Pacman Controller</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100vh; /* Use 100% viewport height */
      overflow: hidden; /* Prevents scrollbars */
      background: #111;
      color: white;
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    @font-face {
        font-family: 'ArcadeR';
        src: url('font/ARCADE_R.TTF');
    }

    h1 {
      font-size: 7vw;
      margin: 0 0 1vh 0;
      font-family: 'ArcadeR', monospace;
    }

    /* --- Container Styling --- */
    .container {
      width: 100%;
      height: 100%; /* Make container fill the vh */
      display: flex;
      flex-direction: column;
      align-items: center;
      box-sizing: border-box; /* Important for padding */
    }

    #lobby-container {
      /* This will now vertically center the content */
      justify-content: center;
      padding: 2vh 0;
    }

    #controller-container {
      display: none; /* Hidden by default */
      flex-direction: column;
      
      /* --- START OF MODIFICATION --- */
      /* Align to the top */
      justify-content: flex-start; 
      /* Push the whole block down from the top */
      padding: 10vh 0 2vh 0; 
      /* --- END OF MODIFICATION --- */
      
      height: 100%; /* Ensure it fills the viewport height */
      box-sizing: border-box;
    }

    /* --- Lobby Styling --- */
    #lobby-container h1 {
      font-size: 8vw;
      color: #FFFF00; /* Pac-Man Yellow */
    }

    #ghost-selector {
      display: flex;
      flex-direction: column; /* Stack image and text vertically */
      align-items: center;
      justify-content: center;
      margin: 2vh 0;
    }
    
    .ghost-selector-row {
      display: flex;
      align-items: center;
    }

    .arrow-btn {
      font-size: 15vmin;
      color: #fff;
      background: none;
      border: none;
      padding: 0 5vw;
      cursor: pointer;
    }
    .arrow-btn:disabled {
      color: #444;
    }

    #ghost-image-lobby {
      width: 45vmin;
      height: 45vmin;
      image-rendering: pixelated; /* Keeps the pixel art sharp */
    }

    #ghost-name-lobby {
      font-size: 5vw;
      color: #fff;
      margin-top: 1.5vh;
      font-weight: bold;
      text-transform: capitalize;
      font-family: 'ArcadeR', monospace;
    }

    #player-name-lobby {
      width: 70vw;
      max-width: 300px;
      
      /* --- START OF MODIFICATION --- */
      padding: 10px; /* Reduced padding */
      font-size: 4vw; /* Reduced font size */
      /* --- END OF MODIFICATION --- */

      text-align: center;
      background: #333;
      color: #fff;
      border: 2px solid #555;
      border-radius: 8px;
      margin-bottom: 2vh;
      font-family: 'ArcadeR', monospace;
    }

    #join-button {
      width: 70vw;
      max-width: 300px;
      padding: 15px;
      font-size: 6vw;
      font-weight: bold;
      color: #111;
      background: #87CEEB; /* Skyblue */
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'ArcadeR', monospace;
    }
    #join-button:disabled {
      background: #555;
      color: #888;
    }

    #lobby-status {
      margin-top: 2vh;
      color: #ff4444;
      font-size: 4vw;
      height: 1.2em; 
      font-family: 'ArcadeR', monospace;
    }

    /* --- Controller View Styling (Re-ordered) --- */
    #player-name-ingame {
      font-size: 7vw;
      font-weight: bold;
      color: #87CEEB; /* Skyblue */
      margin-bottom: 1vh; /* Add a little space */
      font-family: 'ArcadeR', monospace;
    }

    #ghost-image-ingame {
      width: 40vmin; /* 4x larger (as requested) */
      height: 40vmin; /* 4x larger (as requested) */
      image-rendering: pixelated;
    }
    
    #playing-as-text {
      font-size: 5vw;
      margin: 1vh 0 0 0; /* Add a little space */
      text-transform: capitalize;
      font-family: 'ArcadeR', monospace;
    }

    #joystick-container {
      position: relative;
      /* This creates the gap between the text and the joystick */
      margin-top: 8vh; 
      margin-bottom: 3vh; 
    }

    #joystick-base {
      position: relative;
      width: 40vmin;
      height: 40vmin;
      background: rgba(135, 206, 235, 0.4); 
      border: 3px solid #87CEEB;
      border-radius: 50%;
    }

    #joystick-stick {
      position: absolute;
      width: 20vmin;
      height: 20vmin;
      background: #007FFF;
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      transition: transform 0.05s linear;
    }

    #connection-status {
      font-size: 4vw;
      font-weight: bold;
      margin: 0;
      font-family: 'ArcadeR', monospace;
    }

  </style>
</head>
<body>

  <div id="lobby-container" class="container">
    <h1>CHOOSE YOUR GHOST</h1>
    
    <input type="text" id="player-name-lobby" placeholder="Enter Your Name">

    <div id="ghost-selector">
      <div class="ghost-selector-row">
        <button id="prev-ghost" class="arrow-btn">&lt;</button>
        <img id="ghost-image-lobby" src="/images/blinky.png" alt="Selected Ghost">
        <button id="next-ghost" class="arrow-btn">&gt;</button>
      </div>
      <p id="ghost-name-lobby">playing as Blinky</p>
    </div>
    
    <button id="join-button">JOIN GAME</button>

    <p id="lobby-status"></p>
  </div>

  <div id="controller-container" class="container">
    
    <span id="player-name-ingame">Player</span>
    
    <img id="ghost-image-ingame" src="/images/blinky.png">
    
    <p id="playing-as-text">playing as <span id="ghost-name-ingame">Blinky</span></p>

    <div id="joystick-container">
      <div id="joystick-base">
        <div id="joystick-stick"></div>
      </div>
    </div>
    
    <p id="connection-status">Status: <span id="status-text">Connecting...</span></p>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    // --- Page Elements ---
    const lobbyContainer = document.getElementById('lobby-container');
    const controllerContainer = document.getElementById('controller-container');
    const lobbyStatus = document.getElementById('lobby-status');

    // Lobby Elements
    const prevGhostBtn = document.getElementById('prev-ghost');
    const nextGhostBtn = document.getElementById('next-ghost');
    const ghostImageLobby = document.getElementById('ghost-image-lobby');
    const ghostNameLobby = document.getElementById('ghost-name-lobby');
    const playerNameInput = document.getElementById('player-name-lobby');
    const joinButton = document.getElementById('join-button');

    // Controller Elements
    const playerNameIngame = document.getElementById('player-name-ingame');
    const ghostImageIngame = document.getElementById('ghost-image-ingame');
    const ghostNameIngame = document.getElementById('ghost-name-ingame');
    const statusText = document.getElementById('status-text');
    const base = document.getElementById('joystick-base');
    const stick = document.getElementById('joystick-stick');

    // --- State Variables ---
    const GHOSTS = [
      { name: 'blinky', path: '/images/blinky.png' },
      { name: 'pinky', path: '/images/pinky.png' },
      { name: 'inky', path: '/images/inky.png' },
      { name: 'clyde', path: '/images/clyde.png' }
    ];
    let currentGhostIndex = 0;
    let takenGhosts = {}; // { blinky: { name: "Player1" }, pinky: null, ... }
    let myGhostName = null;

    let baseCenterX, baseCenterY;
    let maxDistance;
    let deadZone;
    let currentDirection = null;
    let activeTouchId = null;

    // --- View Switching ---
    function showLobby() {
      lobbyContainer.style.display = 'flex';
      controllerContainer.style.display = 'none';
      lobbyStatus.textContent = '';
      updateGhostSelector(); // Re-check ghost availability
    }

    function showController(player) {
      lobbyContainer.style.display = 'none';
      controllerContainer.style.display = 'flex';
      
      myGhostName = player.ghost;
      const ghostData = GHOSTS.find(g => g.name === player.ghost);
      
      // Populate player info
      playerNameIngame.textContent = player.name;
      ghostImageIngame.src = ghostData.path;
      ghostNameIngame.textContent = player.ghost;

      // We MUST re-initialize the joystick here, *after* it becomes visible
      // Otherwise, getBoundingClientRect() returns zeros.
      // A small delay ensures the browser has rendered it.
      setTimeout(initializeJoystick, 50);
    }

    // --- Lobby Logic ---
    function updateGhostSelector() {
      const ghost = GHOSTS[currentGhostIndex];
      ghostImageLobby.src = ghost.path;
      ghostNameLobby.textContent = `playing as ${ghost.name}`; // Update text

      // Check if this ghost is taken
      if (takenGhosts[ghost.name]) {
        joinButton.disabled = true;
        joinButton.textContent = 'TAKEN';
        lobbyStatus.textContent = `${ghost.name} is being played by ${takenGhosts[ghost.name].name}`;
      } else {
        joinButton.disabled = false;
        joinButton.textContent = 'JOIN GAME';
        lobbyStatus.textContent = '';
      }
    }

    prevGhostBtn.addEventListener('click', () => {
      currentGhostIndex = (currentGhostIndex - 1 + GHOSTS.length) % GHOSTS.length;
      updateGhostSelector();
    });

    nextGhostBtn.addEventListener('click', () => {
      currentGhostIndex = (currentGhostIndex + 1) % GHOSTS.length;
      updateGhostSelector();
    });

    joinButton.addEventListener('click', () => {
      const playerName = playerNameInput.value || 'Player';
      const ghostName = GHOSTS[currentGhostIndex].name;
      
      lobbyStatus.textContent = `Joining as ${ghostName}...`;
      joinButton.disabled = true;
      
      socket.emit('join-request', { name: playerName, ghost: ghostName });
    });

    // --- Socket Handlers ---
    socket.on('connect', () => {
      statusText.textContent = 'Connected!';
      statusText.style.color = 'lime';
      // Ask server for the current ghost status
      socket.emit('controller-ready');
    });
    
    socket.on('disconnect', () => {
      statusText.textContent = 'Disconnected';
      statusText.style.color = 'red';
      myGhostName = null;
      showLobby();
    });

    socket.on('ghost-status', (status) => {
      takenGhosts = status;
      // If we are in the lobby, update the selector
      if (controllerContainer.style.display === 'none') {
        updateGhostSelector();
      }
    });

    socket.on('join-success', (player) => {
      // Server confirmed our join request
      showController(player);
    });

    socket.on('join-error', (data) => {
      // Server rejected our join request
      lobbyStatus.textContent = data.message;
      joinButton.disabled = false; // Re-enable button
      // We removed updateGhostSelector() from here to prevent it from clearing the error message
    });

    // --- Socket Emitter (Joystick) ---
    const sendDirection = (dir, pressed) => {
      if (dir && myGhostName) { // Only send if we are in-game
        socket.emit('control', { 
          direction: dir, 
          pressed: pressed 
        });
      }
    };

    // --- Joystick Logic (Copied from original) ---
    function getDirection(dx, dy) {
      if (Math.abs(dx) < deadZone && Math.abs(dy) < deadZone) return null;
      if (Math.abs(dx) > Math.abs(dy)) {
        return (dx > 0) ? 'right' : 'left';
      } else {
        return (dy > 0) ? 'down' : 'up';
      }
    }

    function initializeJoystick() {
      if (!base.offsetParent) return; // Don't run if hidden
      const baseRect = base.getBoundingClientRect();
      baseCenterX = baseRect.left + baseRect.width / 2;
      baseCenterY = baseRect.top + baseRect.height / 2;
      maxDistance = base.offsetWidth / 2 - stick.offsetWidth / 2;
      deadZone = maxDistance * 0.2;
    }

    function moveStick(clientX, clientY) {
      const dx = clientX - baseCenterX;
      const dy = clientY - baseCenterY;
      const distance = Math.sqrt(dx * dx + dy * dy);
      const angle = Math.atan2(dy, dx);
      
      const stickDistance = Math.min(distance, maxDistance);
      const stickPosX = Math.cos(angle) * stickDistance;
      const stickPosY = Math.sin(angle) * stickDistance;

      stick.style.transform = `translate(calc(-50% + ${stickPosX}px), calc(-50% + ${stickPosY}px))`;

      const newDirection = getDirection(dx, dy);
      if (newDirection !== currentDirection) {
        sendDirection(currentDirection, false);
        sendDirection(newDirection, true);
        currentDirection = newDirection;
      }
    }

    document.body.addEventListener('touchstart', (e) => {
      if (controllerContainer.style.display === 'none') return; // Ignore touches in lobby
      e.preventDefault();
      if (activeTouchId !== null) return;
      const touch = e.changedTouches[0];
      activeTouchId = touch.identifier;
      moveStick(touch.clientX, touch.clientY);
    }, { passive: false });

    document.body.addEventListener('touchmove', (e) => {
      if (controllerContainer.style.display === 'none') return;
      e.preventDefault();
      if (activeTouchId === null) return;
      const touch = Array.from(e.changedTouches).find(t => t.identifier === activeTouchId);
      if (!touch) return;
      moveStick(touch.clientX, touch.clientY);
    }, { passive: false });

    function onTouchEnd(e) {
      if (controllerContainer.style.display === 'none') return;
      e.preventDefault();
      if (activeTouchId === null) return;
      const touch = Array.from(e.changedTouches).find(t => t.identifier === activeTouchId);
      if (!touch) return;

      activeTouchId = null;
      stick.style.transform = 'translate(-50%, -50%)';
      
      if (currentDirection) {
        sendDirection(currentDirection, false);
        currentDirection = null;
      }
    }

    document.body.addEventListener('touchend', onTouchEnd);
    document.body.addEventListener('touchcancel', onTouchEnd);

    window.addEventListener('resize', initializeJoystick);

    // --- Initial Setup ---
    showLobby(); // Start on the lobby screen

  </script>
</body>
</html>
